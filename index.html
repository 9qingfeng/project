<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Meeting</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(8, 17, 31, 0.82);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f2f7ff;
      --muted: rgba(242, 247, 255, 0.72);
      --accent: #27c281;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top, rgba(39, 194, 129, 0.18), transparent 28%),
        linear-gradient(180deg, #0d1a2d 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(92vw, 420px);
      padding: 24px;
      border-radius: 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(14px);
    }

    .title {
      margin: 0 0 10px;
      font-size: 24px;
      font-weight: 700;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .status {
      margin: 18px 0 0;
      font-size: 14px;
      color: var(--accent);
    }

    .fallback {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      font-size: 14px;
      color: var(--muted);
    }

    .fallback.hidden {
      display: none;
    }

    a {
      color: #7ce9b5;
    }

    .hint {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">会議に接続しています</h1>
    <p class="desc">安全な会議ページへ移動しています。カメラやマイクの許可は、移動先の会議ページで求められます。</p>
    <p id="status" class="status">接続先を準備しています...</p>
    <div id="fallback" class="fallback hidden">
      <div>自動で移動しない場合は、下のリンクを開いてください。</div>
      <div class="hint"><a id="meeting-link" href="#" rel="noopener noreferrer">会議ページを開く</a></div>
    </div>
  </div>

  <script>
    const ROOM_NAME = 'kase2439phoneroom2';
    const DOMAIN = 'meet.jit.si';
    const meetingUrl = new URL(`https://${DOMAIN}/${ROOM_NAME}`);
    const statusEl = document.getElementById('status');
    const fallbackEl = document.getElementById('fallback');
    const meetingLinkEl = document.getElementById('meeting-link');

    meetingUrl.hash = 'config.prejoinPageEnabled=false&config.disableDeepLinking=true';
    meetingLinkEl.href = meetingUrl.toString();

    function showFallback(message) {
      statusEl.textContent = message;
      fallbackEl.classList.remove('hidden');
    }

    function redirectToMeeting() {
      statusEl.textContent = '会議ページへ移動しています...';
      window.location.replace(meetingUrl.toString());
    }

    window.addEventListener('load', function () {
      setTimeout(redirectToMeeting, 120);
      setTimeout(function () {
        showFallback('自動移動がブロックされた可能性があります。会議ページを直接開いてください。');
      }, 1800);
    });
  </script>
</body>
</html>
